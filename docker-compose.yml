# MacCMS10 本地一键全栈运行（需 Docker Desktop）
# 用法：  docker compose up -d --build
# 访问：  http://localhost:8080/install.php  （首次安装）
#         http://localhost:8080/index.php     （前台）
#         http://localhost:8080/admin.php     （后台，部署时务必改名）
services:
  db:
    image: mysql:5.7
    container_name: maccms-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: maccms10
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --sql-mode=""
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    image: php:8.2-apache
    container_name: maccms-web
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    working_dir: /var/www/html
    # 装 maccms 所需扩展：gd（图片）、mysqli/pdo_mysql（数据库）、开启 rewrite
    command: >
      bash -c "apt-get update && apt-get install -y --no-install-recommends libpng-dev libfreetype6-dev libjpeg62-turbo-dev unzip git &&
               docker-php-ext-configure gd --with-freetype --with-jpeg &&
               docker-php-ext-install -j$$(nproc) gd mysqli pdo_mysql &&
               a2enmod rewrite &&
               apache2-foreground"

volumes:
  dbdata:
